version: "3.9"

services:
  hiresense-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: hiresense-ai:latest
    container_name: hiresense-ai
    ports:
      - "5000:5000"
    env_file:
      - .env
    environment:
      - FLASK_ENV=production
    volumes:
      # Persist the cache and FAISS index across container restarts.
      - hiresense-cache:/app/.cache
      - hiresense-index:/app/data/faiss_index
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:5000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 40s

volumes:
  hiresense-cache:
  hiresense-index:
